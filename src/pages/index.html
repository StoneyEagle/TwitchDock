<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TwitchDock</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="container">
    <h1>TwitchDock</h1>
    <form id="form">
      <div class="input-row">
        <input type="text" id="channel" placeholder="Channel name" autocomplete="off" spellcheck="false" />
        <button type="submit">Open</button>
      </div>
    </form>
    <div class="btn-row">
      <button type="button" class="btn-secondary" id="twitch-login">Twitch Login</button>
      <button type="button" class="btn-secondary" id="ffz-import">Import FFZ</button>
      <button type="button" class="btn-quit" id="quit">Shutdown</button>
    </div>
    <p class="hint">Pin &amp; Lock controls are on the chat window</p>
    <p class="signature">by <a href="https://twitch.tv/Stoney_Eagle" target="_blank" rel="noopener">Stoney_Eagle</a></p>
  </div>
  <script src="index.js"></script>
</body>
</html>
